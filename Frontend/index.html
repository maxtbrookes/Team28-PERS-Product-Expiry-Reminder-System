<!DOCTYPE html>
<html>
<head>
    <title>Product Manager</title>
</head>

<div id="overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    <div style="background:white; padding:20px; margin:100px auto; width:300px;">
        <h3>Update Product</h3>

        <span>Name:</span>
        <input id="editName" placeholder="Name"><br><br>
        <span>Category:</span>
        <input id="editCategory" placeholder="Category"><br><br>
        <span>Expiry Date:</span>
        <input id="editExpiry" placeholder="Expiry Date"><br><br>

        <button onclick="updateProduct()">Update</button>
        <button onclick="closeOverlay()">Cancel</button>
    </div>
</div>

<body>

    <h1>Product Manager</h1>

    <!-- Add Product -->
    <h2>Add Product</h2>
    <input id="category" placeholder="Category">
    <input id="name" placeholder="Name">
    <input id="expiry_date" placeholder="Expiry Date">
    <button onclick="addProduct()">Add</button>

    <!-- Products -->
    <h2>Products</h2>
    <ul id="productList"></ul>

<script>
    let currentProductId = null;
    const BASE_URL = "http://127.0.0.1:5000";

    // Load products
    async function loadProducts() {
        try {
            const res = await fetch(`${BASE_URL}/read_products`);
            const data = await res.json();

            const list = document.getElementById("productList");
            list.innerHTML = "";

            data.forEach(p => {
                const li = document.createElement("li");
                const span = document.createElement("span");
                const delButton = document.createElement("button");
                const updateButton = document.createElement("button");
                span.textContent = `Product Id: ${p.id} - Name: ${p.name} - Category: ${p.category} - Expiry Date: ${p.expiry_date} - Date Added: ${p.added_date}  `;
                delButton.textContent = "Delete";
                updateButton.textContent = "Update";
                delButton.onclick = () => deleteProduct(p.id);
                updateButton.onclick = () => openOverlay(p);
                li.appendChild(span);
                span.appendChild(delButton);
                span.appendChild(updateButton);
                list.appendChild(li);
            });

        } catch (err) {
            console.error("Error loading products:", err);
        }
    }

    // Add product
    async function addProduct() {
        const product = {
            category: document.getElementById("category").value,
            name: document.getElementById("name").value,
            expiry_date: document.getElementById("expiry_date").value
        };

        await fetch(`${BASE_URL}/add_product`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(product)
        });

        loadProducts();
    }

    // Delete product
    async function deleteProduct(id) {
        await fetch(`${BASE_URL}/delete_product`, {
            method: "DELETE",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ id: id })
        });

        loadProducts();
    }

    // Update Overlay
    function openOverlay(product) {
        currentProductId = product.id;

        document.getElementById("editName").value = product.name;
        document.getElementById("editCategory").value = product.category;
        document.getElementById("editExpiry").value = product.expiry_date;

        document.getElementById("overlay").style.display = "block";
    }

    // Close Overlay
    function closeOverlay() {
        document.getElementById("overlay").style.display = "none";
    }

    // Update product
    async function updateProduct(id) {
        const name = document.getElementById("editName").value.trim();
        const category = document.getElementById("editCategory").value.trim();
        const expiry_date = document.getElementById("editExpiry").value.trim();

        if (!name || !category || !expiry_date) {
            alert("All fields are required.");
            closeOverlay();
            return;
        }

        const result = validateDate(expiry_date);

        if (!result.valid) {
            alert(result.message);
            closeOverlay();
            return;
        }

        await fetch(`${BASE_URL}/update_product`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                id: currentProductId,
                name: name,
                category: category,
                expiry_date: expiry_date
            })
        });

        closeOverlay();
        loadProducts();
    }

    // Validate date, just if it is in DD/MM/YYYY format and if it is a real date
    function validateDate(dateStr) {
        if (!dateStr) {
            return { valid: false, message: "Date is required" };
        }

        const pattern = /^\d{2}\/\d{2}\/\d{4}$/;
        if (!pattern.test(dateStr)) {
            return { valid: false, message: "Format must be DD/MM/YYYY" };
        }

        const [day, month, year] = dateStr.split("/").map(Number);
        const date = new Date(year, month - 1, day);

        if (
            date.getFullYear() !== year ||
            date.getMonth() !== month - 1 ||
            date.getDate() !== day
        ) {
            return { valid: false, message: "Invalid date" };
        }

        return { valid: true };
    }

    window.onload = loadProducts;
</script>

</body>
</html>
