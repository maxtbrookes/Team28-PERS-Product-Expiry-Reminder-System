<!DOCTYPE html>
<html lang="en">
<head>
<!- comments translated to English and small UI improvements added
- lock icons added for opened/closed state->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERS Product Manager</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f3f4f6;
            margin:0;
            padding:20px;
        }

        .main-box{
            max-width:950px;
            margin:auto;
        }

        .top-box{
            background:#163d6b;
            color:white;
            padding:18px;
            border-radius:12px;
            margin-bottom:18px;
        }

        .top-box h1{
            margin:0;
        }

        .top-box p{
            margin:6px 0 0 0;
        }

        .section{
            background:white;
            padding:18px;
            border-radius:12px;
            margin-bottom:18px;
            box-shadow:0 3px 10px rgba(0,0,0,0.08);
        }

        .row{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        input{
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
            min-width:170px;
        }

        button{
            padding:10px 14px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        .blue-btn{
            background:#163d6b;
            color:white;
        }

        #productList{
            list-style:none;
            padding:0;
            margin:0;
        }

        #noteBox{
            display:none;
            background:#fff4d8;
            border:1px solid #ecd39a;
            color:#8a5a00;
            padding:12px;
            border-radius:10px;
        }

        #smallMessage{
            margin-top:10px;
            font-size:14px;
            font-weight:bold;
        }

        #overlay{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.45);
        }

        .overlay-inside{
            background:white;
            width:320px;
            margin:90px auto;
            padding:20px;
            border-radius:12px;
        }

        .overlay-inside h3{
            margin-top:0;
            color:#163d6b;
        }
    </style>
</head>
<body>

<div class="main-box">

    <div class="top-box">
        <h1>PERS</h1>
        <p>Oxford Brookes Student Food Assistant</p>
    </div>

    <div class="section">
        <h2>Add Product</h2>
        <div class="row">
            <input id="category" placeholder="Category">
            <input id="name" placeholder="Name">
            <input id="expiry_date" placeholder="Expiry Date DD/MM/YYYY">
            <button class="blue-btn" onclick="addProduct()">Add Product</button>
        </div>
        <div id="smallMessage"></div>
    </div>

    <div class="section">
        <h2>Notification</h2>
        <div id="noteBox"></div>
    </div>

    <div class="section">
        <h2>Products</h2>
        <ul id="productList"></ul>
    </div>

</div>

<div id="overlay">
    <div class="overlay-inside">
        <h3>Update Product</h3>

        <span>Name:</span><br>
        <input id="editName" placeholder="Name"><br><br>

        <span>Category:</span><br>
        <input id="editCategory" placeholder="Category"><br><br>

        <span>Expiry Date:</span><br>
        <input id="editExpiry" placeholder="Expiry Date"><br><br>

        <button class="blue-btn" onclick="updateProduct()">Update</button>
        <button class="grey-btn" onclick="closeOverlay()">Cancel</button>
    </div>
</div>

<script>
    let currentId = null; //for knowing which product now editing we are

    function showMsg(text){
        const box = document.getElementById("noteBox");
        box.style.display = "block";
        box.textContent = text;
    }

    async function addProduct(){
        const category = document.getElementById("category").value.trim();
        const name = document.getElementById("name").value.trim();
        const expiry_date = document.getElementById("expiry_date").value.trim();
        const msg = document.getElementById("smallMessage");
        // IF one of them empty is STOP it there
        if(!category || !name || !expiry_date){
            msg.textContent = "Please fill all fields";
            msg.style.color = "red";
            return;
        }

        const check = validateDate(expiry_date);

        if(!check.valid){
            msg.textContent = check.message;
            msg.style.color = "red";
            return;
        }

        try{
            await fetch(`${BASE_URL}/add_product`, {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({
                    category: category,
                    name: name,
                    expiry_date: expiry_date
                })
            });

            msg.textContent = "Product added";
            msg.style.color = "green";
            //after add , form is reset for next use
            document.getElementById("category").value = "";
            document.getElementById("name").value = "";
            document.getElementById("expiry_date").value = "";

            await loadProducts();
        }catch(err){
            console.log("add error", err);
            msg.textContent = "Could not add product";
            msg.style.color = "red";
        }
    }

    async function deleteProduct(id){
        try{
            await fetch(`${BASE_URL}/delete_product`, {
                method:"DELETE",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({id:id})
            });
            // remove from opened state also if exists there
            if(typeof openedState !== "undefined"){
                delete openedState[id];
            }

            showMsg("Product deleted");
            await loadProducts();
        }catch(err){
            console.log("delete error", err);
            showMsg("Delete failed");
        }
    }

    function openOverlay(product){
        currentId = product.id;
        // old values inside putting so user can edit
        document.getElementById("editName").value = product.name;
        document.getElementById("editCategory").value = product.category;
        document.getElementById("editExpiry").value = product.expiry_date;

        document.getElementById("overlay").style.display = "block";
    }

    function closeOverlay(){
        // Hide the edit modal after update or cancel action
        document.getElementById("overlay").style.display = "none";
    }

    async function updateProduct(){
        const name = document.getElementById("editName").value.trim();
        const category = document.getElementById("editCategory").value.trim();
        const expiry_date = document.getElementById("editExpiry").value.trim();
        // Prevent empty values from being submitted
        if(!name || !category || !expiry_date){
            alert("All fields are required");
            return;
        }

        const check = validateDate(expiry_date);

        if(!check.valid){
            alert(check.message);
            return;
        }

        try{   // Send updated product data to the backend
            await fetch(`${BASE_URL}/update_product`, {
                method:"PUT",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({
                    id: currentId,
                    name: name,
                    category: category,
                    expiry_date: expiry_date
                })
            });

            closeOverlay();
            showMsg("Product updated");
            await loadProducts();
        }catch(err){
            console.log("update error", err);
            alert("Update failed");
        }
    }

    function validateDate(dateStr){ // Date input must not be empty
        if(!dateStr){
            return {valid:false, message:"Date is required"};
        }

        const pattern = /^\d{2}\/\d{2}\/\d{4}$/;

        if(!pattern.test(dateStr)){
            return {valid:false, message:"Format must be DD/MM/YYYY"};
        }

        const parts = dateStr.split("/");
        const day = Number(parts[0]);
        const month = Number(parts[1]);
        const year = Number(parts[2]);

        const date = new Date(year, month - 1, day);

        if( // it makes sure the constructed date is a real calendar date
            date.getFullYear() !== year ||
            date.getMonth() !== month - 1 ||
            date.getDate() !== day
        ){
            return {valid:false, message:"Invalid date"};
        }

        return {valid:true};
    }

    window.onload = function(){
        loadProducts();
    };
</script>

<script src="global.js"></script>
</body>
</html>
